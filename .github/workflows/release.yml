name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}, Version: ${VERSION}"

      - name: Prepare source tree
        run: |
          cp dkms.conf drivers/aic8800/dkms.conf

      - name: Create source tarball
        id: tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKGDIR="AIC8800-Linux-Driver-main"
          mkdir -p "${PKGDIR}/drivers"
          mkdir -p "${PKGDIR}/fw"
          mkdir -p "${PKGDIR}/tools"
          cp -r drivers/aic8800/aic_load_fw "${PKGDIR}/drivers/"
          cp -r drivers/aic8800/aic8800_fdrv "${PKGDIR}/drivers/"
          cp drivers/aic8800/Kconfig "${PKGDIR}/drivers/"
          cp drivers/aic8800/Makefile "${PKGDIR}/drivers/"
          cp dkms.conf "${PKGDIR}/"
          cp -r fw/aic8800D80 "${PKGDIR}/fw/"
          cp tools/aic.rules "${PKGDIR}/tools/"
          cp LICENSE "${PKGDIR}/"
          cp README.md "${PKGDIR}/"
          TARBALL="AIC8800-Linux-Driver-${VERSION}.tar.zst"
          tar --zstd -cf "${TARBALL}" "${PKGDIR}/"
          rm -rf "${PKGDIR}"
          echo "tarball=${TARBALL}" >> $GITHUB_OUTPUT

      - name: Install bsdtar
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Build pacman package
        id: pacman
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKGDIR="AIC8800-Linux-Driver-main"
          tar --zstd -xf "AIC8800-Linux-Driver-${VERSION}.tar.zst"
          PKGFILE="aic8800-fdrv-dkms-${{ steps.version.outputs.version }}-1-any.pkg.tar.zst"
          mkdir -p "${PKGDIR}/usr/src/aic8800-fdrv-dkms-${{ steps.version.outputs.version }}/aic_load_fw"
          mkdir -p "${PKGDIR}/usr/src/aic8800-fdrv-dkms-${{ steps.version.outputs.version }}/aic8800_fdrv"
          cp -r "${PKGDIR}/drivers/aic_load_fw"/* "${PKGDIR}/usr/src/aic8800-fdrv-dkms-${{ steps.version.outputs.version }}/aic_load_fw/"
          cp -r "${PKGDIR}/drivers/aic8800_fdrv"/* "${PKGDIR}/usr/src/aic8800-fdrv-dkms-${{ steps.version.outputs.version }}/aic8800_fdrv/"
          cp "${PKGDIR}/drivers/Kconfig" "${PKGDIR}/usr/src/aic8800-fdrv-dkms-${{ steps.version.outputs.version }}/"
          cp "${PKGDIR}/drivers/Makefile" "${PKGDIR}/usr/src/aic8800-fdrv-dkms-${{ steps.version.outputs.version }}/"
          cp "${PKGDIR}/dkms.conf" "${PKGDIR}/usr/src/aic8800-fdrv-dkms-${{ steps.version.outputs.version }}/"
          mkdir -p "${PKGDIR}/usr/lib/firmware/aic8800D80"
          cp -r "${PKGDIR}/fw/aic8800D80/"* "${PKGDIR}/usr/lib/firmware/aic8800D80/"
          mkdir -p "${PKGDIR}/etc/udev/rules.d"
          cp "${PKGDIR}/tools/aic.rules" "${PKGDIR}/etc/udev/rules.d/aic.rules"
          mkdir -p "${PKGDIR}/usr/share/doc/aic8800-fdrv-dkms"
          cp "${PKGDIR}/README.md" "${PKGDIR}/usr/share/doc/aic8800-fdrv-dkms/"
          cat > "${PKGDIR}/.PKGINFO" <<EOF
pkgname = aic8800-fdrv-dkms
pkgver = ${VERSION}
pkgrel = 1
arch = any
license = GPL2
url = https://github.com/ronnyf/AIC8800-Linux-Driver
depends = linux-headers
description = AIC8800 Linux Driver (DKMS)
EOF
          bsdtar -c --format=mtree --options=all=filetype,mode --file "${PKGDIR}/.MTREE" -C "${PKGDIR}" -- .
          bsdtar -c -f "${PKGFILE}" --format=ustar --options=all=filetype,mode -C "${PKGDIR}" -- .
          mv "${PKGFILE}" ../
          rm -rf "${PKGDIR}"
          echo "pkg=${PKGFILE}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            ${{ steps.tarball.outputs.tarball }}
            ${{ steps.pacman.outputs.pkg }}

