name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}, Version: ${VERSION}"

      - name: Prepare source tree
        run: |
          cp dkms.conf drivers/aic8800/dkms.conf

      - name: Create source tarball
        id: tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKGDIR="AIC8800-Linux-Driver-main"
          mkdir -p "${PKGDIR}"
          cp -r drivers/aic8800/aic_load_fw "${PKGDIR}/"
          cp -r drivers/aic8800/aic8800_fdrv "${PKGDIR}/"
          cp drivers/aic8800/Kconfig "${PKGDIR}/"
          cp drivers/aic8800/Makefile "${PKGDIR}/"
          cp dkms.conf "${PKGDIR}/"
          cp -r fw/aic8800D80 "${PKGDIR}/"
          cp -r tools "${PKGDIR}/"
          cp LICENSE "${PKGDIR}/"
          cp README.md "${PKGDIR}/"
          TARBALL="AIC8800-Linux-Driver-${VERSION}.tar.zst"
          tar --zstd -cf "${TARBALL}" "${PKGDIR}/"
          rm -rf "${PKGDIR}"
          echo "tarball=${TARBALL}" >> $GITHUB_OUTPUT

      - name: Build pacman package
        id: pacman
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKGDIR="AIC8800-Linux-Driver-main"
          tar --zstd -xf "AIC8800-Linux-Driver-${VERSION}.tar.zst"
          cp "AIC8800-Linux-Driver-${VERSION}.tar.zst" "${PKGDIR}/"
          cd "${PKGDIR}"
          makepkg --noconfirm --skipinteg
          PKGFILE=$(ls aic8800-fdrv-dkms-*.pkg.tar.zst 2>/dev/null)
          mv "${PKGFILE}" ../
          cd ..
          rm -rf "${PKGDIR}"
          echo "pkg=${PKGFILE}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            ${{ steps.tarball.outputs.tarball }}
            ${{ steps.pacman.outputs.pkg }}

