name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install build tools
        run: |
          pacman -Syu --noconfirm --needed git sudo

      - name: Create builder user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            PKGVER="${VERSION%-*}"
            PKGREL="${VERSION##*-}"
          else
            PKGVER="$VERSION"
            PKGREL="1"
          fi
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "pkgver=${PKGVER}"
            echo "pkgrel=${PKGREL}"
          } >> "$GITHUB_OUTPUT"
          echo "Tag=${TAG} pkgver=${PKGVER} pkgrel=${PKGREL}"

      - name: Create source tarball
        id: tarball
        run: |
          PKGVER="${{ steps.version.outputs.pkgver }}"
          PKGREL="${{ steps.version.outputs.pkgrel }}"
          PKGDIR="AIC8800-Linux-Driver-${PKGVER}-${PKGREL}"
          TARBALL="${PKGDIR}.tar.gz"

          mkdir -p "_stage/${PKGDIR}/drivers/aic8800"
          mkdir -p "_stage/${PKGDIR}/fw"
          mkdir -p "_stage/${PKGDIR}/tools"

          cp -r drivers/aic8800/aic_load_fw  "_stage/${PKGDIR}/drivers/aic8800/"
          cp -r drivers/aic8800/aic8800_fdrv "_stage/${PKGDIR}/drivers/aic8800/"
          cp    drivers/aic8800/Makefile     "_stage/${PKGDIR}/drivers/aic8800/"
          cp    drivers/aic8800/Kconfig      "_stage/${PKGDIR}/drivers/aic8800/"
          cp -r fw/aic8800D80                "_stage/${PKGDIR}/fw/"
          cp    tools/aic.rules              "_stage/${PKGDIR}/tools/"
          cp    dkms.conf                    "_stage/${PKGDIR}/"
          cp    LICENSE                      "_stage/${PKGDIR}/"
          cp    README.md                    "_stage/${PKGDIR}/"

          tar -czf "${TARBALL}" -C _stage "${PKGDIR}"
          rm -rf _stage

          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          ls -lh "${TARBALL}"

      - name: Patch PKGBUILD with tag version
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${{ steps.version.outputs.pkgrel }}/" PKGBUILD
          grep -E '^(pkgname|pkgver|pkgrel)=' PKGBUILD

      - name: Build pacman package
        id: pacman
        run: |
          chown -R builder:builder .
          sudo -u builder makepkg --noconfirm --skipchecksums --nodeps -f
          PKGFILE=$(ls aic8800-fdrv-dkms-*.pkg.tar.zst | head -1)
          [ -n "$PKGFILE" ] || { echo "ERROR: no .pkg.tar.zst produced"; exit 1; }
          echo "pkg=${PKGFILE}" >> "$GITHUB_OUTPUT"
          ls -lh "${PKGFILE}"
          echo "--- package contents ---"
          bsdtar -tf "${PKGFILE}" | head -40

      - name: Generate .SRCINFO
        run: |
          sudo -u builder makepkg --printsrcinfo > .SRCINFO
          cat .SRCINFO

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ steps.version.outputs.version }}"
          generate_release_notes: true
          body: |
            ## Install on Arch Linux / CachyOS

            **Option 1 â€” install the prebuilt package:**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.pacman.outputs.pkg }}
            sudo pacman -U ${{ steps.pacman.outputs.pkg }}
            ```

            **Option 2 â€” build from PKGBUILD with `makepkg`:**
            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/PKGBUILD
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/aic8800-fdrv-dkms.install
            makepkg -si
            ```

            DKMS rebuilds the modules automatically on each kernel update.
            Make sure the matching headers are installed for your kernel
            (`linux-headers`, `linux-cachyos-headers`, etc.).
          files: |
            ${{ steps.tarball.outputs.tarball }}
            ${{ steps.pacman.outputs.pkg }}
            PKGBUILD
            .SRCINFO
            aic8800-fdrv-dkms.install
