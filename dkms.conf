PACKAGE_NAME="aic8800-fdrv-dkms"
PACKAGE_VERSION="6.4.3.0"

MAKE="make -C ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/aic8800 KDIR=${kernel_source_dir}"

BUILT_MODULE_NAME[0]="aic_load_fw"
BUILT_MODULE_LOCATION[0]="aic8800/aic_load_fw"
DEST_MODULE_LOCATION[0]="/kernel/drivers/net/wireless/aic8800"

BUILT_MODULE_NAME[1]="aic8800_fdrv"
BUILT_MODULE_LOCATION[1]="aic8800/aic8800_fdrv"
DEST_MODULE_LOCATION[1]="/kernel/drivers/net/wireless/aic8800"

AUTOINSTALL="yes"
